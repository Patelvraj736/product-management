<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Product App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <span class="navbar-brand fw-semibold">🛍 Product Manager</span>
        </div>
    </nav>
    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold"> Product Dashboard</h2>
            <button class="btn btn-primary" id="addProductBtn">
                Add Product
            </button>
        </div>
        <div class="row mb-4">

    <div class="col-md-4">
        <input 
            type="text" 
            id="filterId" 
            class="form-control" 
            placeholder="Filter by Product ID">
    </div>

    <div class="col-md-4">
        <select id="sortSelect" class="form-select">
            <option value="">Sort By</option>
            <option value="idAsc">Product ID (Low → High)</option>
            <option value="idDesc">Product ID (High → Low)</option>
            <option value="nameAsc">Product Name (A → Z)</option>
            <option value="nameDesc">Product Name (Z → A)</option>
            <option value="priceAsc">Price (Low → High)</option>
            <option value="priceDesc">Price (High → Low)</option>
        </select>
    </div>

</div>
        <div id="productList" class="row gy-3"></div>

    </div>

    <div class="modal fade" id="productModal">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add Product</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">

                    <form id="productForm">
                        <input type="hidden" id="productId">

                        <div class="mb-3">
                            <label class="form-label">Product Name</label>
                            <input type="text" id="productName" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Price</label>
                            <input type="number" id="price" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea id="description" class="form-control"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Upload Image</label>
                            <input type="file" id="image" class="form-control" accept="image/*">

                            <div class="mt-3 text-center">
                                <img id="imagePreview" class="img-fluid rounded d-none" style="max-height:200px;">
                            </div>
                        </div>

                        <button type="submit" class="btn btn-success w-100">
                            Save Product
                        </button>
                    </form>

                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script type="module" src="./js/app.js"></script>

</body>

</html>
